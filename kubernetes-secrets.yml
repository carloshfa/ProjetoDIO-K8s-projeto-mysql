---
# Kubernetes Secret para armazenar credenciais sensíveis usadas pelo MySQL e backend.
# Utilize `kubectl apply -f kubernetes-secrets.yml` ou `kubectl create secret generic`.
apiVersion: v1
kind: Secret
metadata:
  name: mysql-credentials
type: Opaque
stringData:
  # Credenciais usadas na inicialização do container MySQL
  MYSQL_ROOT_PASSWORD: "Senha123"
  MYSQL_DATABASE: "meubanco"
  MYSQL_USER: "root"
  MYSQL_PASSWORD: "Senha123"

  # Chaves adicionais para o backend (podemos reutilizar os valores acima)
  DB_USERNAME: "root"
  DB_PASSWORD: "Senha123"
  DB_DATABASE: "meubanco"

# Nota: `stringData` permite manter valores em texto claro no manifest para facilitar inicialização.
# Em produção, prefira criar o Secret com `kubectl create secret generic` e armazenar em um cofre.
