name: CI/CD

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - '*'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Validar scripts e manifests
        run: |
          chmod +x scripts/*.sh
          bash scripts/test.sh

      - name: Executar Checkov (análise de segurança)
        uses: bridgecrewio/checkov-action@v9
        with:
          directory: .
        continue-on-error: true

  build-and-push:
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    env:
      IMAGE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || 'latest' }}

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/backend:${IMAGE_TAG} ./backend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/backend:${IMAGE_TAG}

      - name: Build and push frontend image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/frontend:${IMAGE_TAG} ./frontend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/frontend:${IMAGE_TAG}

      - name: Build and push database image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/database:${IMAGE_TAG} ./database
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/database:${IMAGE_TAG}
