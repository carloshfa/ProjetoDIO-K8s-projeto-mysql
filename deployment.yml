# PersistentVolume que armazena os dados do MySQL no nó do cluster.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: mysql-pv
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  hostPath:
    path: /tmp/mysql-data
    type: DirectoryOrCreate
---
# PersistentVolumeClaim que solicita o volume de armazenamento para o deployment do MySQL.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pv-claim
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: local-storage
---
# Deployment responsável por criar o pod do banco MySQL.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  annotations:
    kubernetes.io/change-cause: "Initial deployment: mysql v1.0.0"
spec:
  replicas: 1
  # Mantém um histórico de revisões para permitir `kubectl rollout history`.
  revisionHistoryLimit: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
        app.kubernetes.io/version: "v1.0.0"
    spec:
      containers:
        - name: mysql
          image: YOUR_DOCKERHUB_USERNAME/database:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: Senha123
            - name: MYSQL_DATABASE
              value: meubanco
            - name: MYSQL_USER
              value: root
            - name: MYSQL_PASSWORD
              value: Senha123
          ports:
            - containerPort: 3306
          # Recursos mínimos e máximos solicitados pelo container MySQL.
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          # Probe de readiness para garantir que o MySQL esteja aceitando conexões.
          readinessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          # Probe de liveness para reiniciar o container em caso de falha.
          livenessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: mysql-storage
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-storage
          persistentVolumeClaim:
            claimName: mysql-pv-claim
---
# Deployment responsável pelo backend PHP que se conecta ao MySQL.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  annotations:
    kubernetes.io/change-cause: "Initial deployment: backend v1.0.0"
spec:
  replicas: 1
  revisionHistoryLimit: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        app.kubernetes.io/version: "v1.0.0"
    spec:
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          # InitContainer que aguarda o MySQL estar disponível antes de iniciar o backend.
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "64Mi"
          command:
            - sh
            - -c
            - |
              until nc -z mysql 3306; do
                echo "Aguardando MySQL..."
                sleep 2
              done
      containers:
        - name: backend
          image: YOUR_DOCKERHUB_USERNAME/backend:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: DB_HOST
              value: mysql
            - name: DB_PORT
              value: "3306"
            - name: DB_DATABASE
              value: meubanco
            - name: DB_USERNAME
              value: root
            - name: DB_PASSWORD
              value: Senha123
          ports:
            - containerPort: 80
          # Recursos solicitados e limites definidos para o backend.
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "400m"
              memory: "512Mi"
          # Estado de readiness para verificar se o backend responde na rota raiz.
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          # Probe de liveness para reiniciar o container se a aplicação travar.
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
